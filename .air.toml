root = "."
tmp_dir = "tmp"

[build]
  # Only the API binary; the ETL worker (main.go) is a separate binary
  cmd     = "go build -o ./tmp/api ./cmd/api/main.go"
  bin     = "./tmp/api"
  full_bin = "./tmp/api"

  # Watch all Go packages, not just cmd/internal
  include_ext = ["go"]
  exclude_dir = ["tmp", "vendor", ".git", "scripts", "scratch"]
  include_dir = ["cmd", "internal", "embed", "store", "ingest", "domain"]

  # Stop the old process before starting the new one
  send_interrupt = true
  kill_delay     = "500ms"

[log]
  time = true

[color]
  main    = "magenta"
  watcher = "cyan"
  build   = "yellow"
  runner  = "green"
