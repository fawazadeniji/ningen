services:
  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5434:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Lightweight Python sidecar for embeddings.
  # Uses ONNX Runtime (CPU) — no Torch, very fast and light.
  # Port 8001 is exposed for local development (air hot-reload).
  embedder:
    build:
      context: ./embedder_service
    ports:
      - "8001:8000"
    environment:
      - MODEL_DIR=/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # One-shot ETL worker: runs, ingests items, and exits.
  # Set TARGET_ITEM_COUNT to control dataset size (default: 100000).
  etl_worker:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/postgres?sslmode=disable
      - EMBEDDER_URL=http://embedder:8000
    depends_on:
      db:
        condition: service_healthy
      embedder:
        condition: service_healthy
    restart: "no"

  # Long-running API server.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      - DB_URL=postgres://postgres:postgres@db:5432/postgres?sslmode=disable
      - EMBEDDER_URL=http://embedder:8000
      - PORT=8080
    depends_on:
      db:
        condition: service_healthy
      embedder:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
