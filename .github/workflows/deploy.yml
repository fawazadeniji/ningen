name: CD to Azure VM via Docker Compose

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ${{ secrets.REGISTRY_LOGIN_SERVER }}
  IMAGE_NAME: ningen

jobs:
  build-and-push:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and Push API Image
        run: |
          docker build -f Dockerfile.api -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ github.sha }}

      - name: Build and Push ETL Worker Image
        run: |
          docker build -f Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-etl:${{ github.sha }} .
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-etl:${{ github.sha }}

      - name: Build and Push Embedder Image
        run: |
          docker build -f embedder_service/Dockerfile -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-embedder:${{ github.sha }} ./embedder_service
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-embedder:${{ github.sha }}

  deploy-to-vm:
    needs: build-and-push
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Copy Compose files to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/deploy-ningen"

      - name: Execute Deployment Commands on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/deploy-ningen
            
            # 1. Log the VM into the registry
            echo ${{ secrets.REGISTRY_PASSWORD }} | docker login ${{ env.REGISTRY }} -u ${{ secrets.REGISTRY_USERNAME }} --password-stdin

            # 2. Generate the .env file with secrets AND image variables
            cat <<EOF > .env
            # Application Secrets
            DB_URL=${{ secrets.DB_URL }}
            EMBEDDER_URL=${{ secrets.EMBEDDER_URL }}
            AZURE_OPENAI_URL=${{ secrets.AZURE_OPENAI_URL }}
            AZURE_OPENAI_KEY=${{ secrets.AZURE_OPENAI_KEY }}
            AZURE_OPENAI_API_VERSION=${{ secrets.AZURE_OPENAI_API_VERSION }}
            AZURE_OPENAI_MODEL=${{ secrets.AZURE_OPENAI_MODEL }}
            TARGET_ITEM_COUNT=${{ secrets.TARGET_ITEM_COUNT }}
            WORKER_COUNT=${{ secrets.WORKER_COUNT }}
            MODEL_DIR=/models
            PORT=8080

            # Local Yelp file (optional — set YELP_DATA_DIR on the VM to activate)
            YELP_DATA_DIR=${{ secrets.YELP_DATA_DIR }}
            YELP_FILE=${{ secrets.YELP_FILE }}

            # Deployment Variables for Compose
            REGISTRY_URL=${{ env.REGISTRY }}
            IMAGE_NAME=${{ env.IMAGE_NAME }}
            IMAGE_TAG=${{ github.sha }}
            EOF

            # 3. Pull the latest images to minimize downtime
            docker compose -f docker-compose.prod.yml pull

            # 4. Deploy the stack
            # This recreates containers with updated images and starts them in the background
            docker compose -f docker-compose.prod.yml up -d

            # 5. Clean up old resources
            docker image prune -f --filter "dangling=true" --filter "until=168h"
            
            # 6. Secure the .env file since it contains sensitive data
            chmod 600 .env
